<!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>
</head>
<body>

<table border="1">
    
    <!-- First Row -->
    <tr>
        <td rowspan="2">Heading</td>
        <td colspan="1">Students</td>
        <td colspan="3" align="center
        ">Details</td>
    </tr>

    <!-- Second Row -->
    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Department</th>
        <th>Roll Number</th>
    </tr>

    <!-- Data Rows -->
    <tr>
        <td rowspan="4">Student List</td>
        <td>1</td>
        <td>Victor</td>
        <td>Computer Science</td>
        <td>12345</td>
    </tr>

    <tr>
        <td>2</td>
        <td>Williams</td>
        <td>Electronics</td>
        <td>23456</td>
    </tr>

    <tr>
        <td>3</td>
        <td>Harry</td>
        <td>Electrical</td>
        <td>34567</td>
    </tr>

    <tr>
        <td>4</td>
        <td>Rick</td>
        <td>Civil</td>
        <td>45678</td>
    </tr>

</table>

</body>
</html>
