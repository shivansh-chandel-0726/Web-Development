<hr>


<ol>
    <li>
        (x + y<sup>2</sup>) = x<sup>2</sup> + y<sup>2</sup> + 2xy
    </li>
    <br>
    <li>
        (a - b)<sup>2</sup> = a<sup>2</sup> - 2ab + b<sup>2</sup>
    </li>
    <br>
    <li>
        a<sup>2</sup> + b<sup>2</sup> = (a + b)<sup>2</sup> - 2ab
    </li>
    <br>
    <li>
        (a + b + c)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> + 2ab + 2bc + 2ca
    </li>
    <br>
    <li>
        (a + b)<sup>3</sup> = a<sup>3</sup> + b<sup>3</sup> + 3ab<sup>2</sup> + 3a<sup>2</sup>b
    </li>
</ol>

<ol start="6">
    <li>

    <br>
    <li>
        S<sub>8</sub> + 12O<sub>2</sub> → 8SO<sub>3</sub>
    </li>
    <br>
    <li>
        2Na + 2H<sub>2</sub>O → 2NaOH + H<sub>2</sub>
    </li>
