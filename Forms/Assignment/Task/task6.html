<!DOCTYPE html>
<html>
<head>
    <title></title>
</head>
<body>
    <h3>Dance Registration form</h3>

<form>
    <table border="1" >

        <tr>
            <td>Name:</td>
            <td><input type="text" name="name" size="50"></td>
        </tr>

        <tr>
            <td>IC No:</td>
            <td>
                <input type="text" size="5"> -
                <input type="text" size="5"> -
                <input type="text" size="5">
            </td>
        </tr>

        <tr>
            <td>Address:</td>
            <td>
                <textarea rows="5" cols="50"></textarea>
            </td>
        </tr>

        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
            </td>
        </tr>

        <tr>
            <td>Dance Type:</td>
            <td>
                <input type="checkbox"> Zapin
                <input type="checkbox"> Joget
                <input type="checkbox"> Inang
                <input type="checkbox"> Lion Dance
            </td>
        </tr>

        <tr>
            <td>Competition:</td>
            <td>
                <select size="3">
                    <option>State Level</option>
                    <option>National Level</option>
                    <option>International Level</option>
                    <option >djdbdjbd</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Nationality:</td>
            <td>
                <select>
                    <option>-please select-</option>
                    <option>Malaysian</option>
                    <option>Singaporean</option>
                    <option>Indonesian</option>
                    <option>hdhfbujdbuknd</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Password:</td>
            <td>
                <input type="password">
            </td>
        </tr>

        <tr>
            <td colspan="2" >
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </td>
        </tr>

    </table>
</form>

</body>
</html>
