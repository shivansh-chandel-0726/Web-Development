<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
</head>
<body>

<form>
    First Name:
    <input type="text" name="firstname">
    
    Last Name:
    <input type="text" name="lastname">
    <br><br>

    Date of birth:
    <input type="date" name="dob">
    
    Age:
    <input type="number" name="age">
    <br><br>

    Gender:
    <select name="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

    Email Address:
    <input type="email" name="email" placeholder="Enter email address">
    <br><br>

    Positions Available:
    <input type="radio" name="position" value="junior"> Junior Developer
    <input type="radio" name="position" value="mid"> Mid-level Developer
    <input type="radio" name="position" value="senior"> Senior Developer
    <br><br>

    Programming Languages:
    <input type="checkbox" name="lang" value="java"> Java
    <input type="checkbox" name="lang" value="javascript"> JavaScript
    <input type="checkbox" name="lang" value="python"> Python
    <br><br>

    Password:
    <input type="password" name="password">
    
    Confirm Password:
    <input type="password" name="confirm_password">
    <br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
</form>

</body>
</html>
